<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Reiken</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="icons/ReikenIcon.png" type="img">
</head>
<body>

<!-- TOPBAR -->
<header class="index-topbar">
  <div class="index-topbar-container">
    <span>REIKEN</span>

    <div class="index-topbar-logo">
      <img src="icons/ReikenIcon.png" alt="logo">
    </div>

    <span>STUDIOS</span>
  </div>
</header>

<!-- BACKGROUND -->
<main class="index-background">

  <!-- CARD LOGIN -->
  <section class="login-card">

    <!-- HEADER -->
    <div class="login-card-header">
      <img src="icons/ReikenIcon.png" alt="logo">
      <h2>INICIO DE SESION</h2>
    </div>

    <!-- FORM -->
    <form class="login-form">

      <label>Correo electronico</label>
      <input type="email" required>

      <label>Contraseña</label>
      <input type="password" required>

      <button type="submit" class="button-login">¡HECHO!</button>

      <p class="auth-switch">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>

    </form>

  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="rk_core.js"></script>
<script src="rk_auth.js"></script>
</body>
</html>
